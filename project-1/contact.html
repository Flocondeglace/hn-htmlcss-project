<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sweat Books</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>Sweat Books</h1>
      <ul class="nav">
        <li><a href="index.html">Home</a></li>
        <li>
          <a href="about.html">About</a>
          <ul class="nav--hidden">
            <li><a href="staff.html">Staff</a></li>
          </ul>
        </li>
        <li><a href="gallery.html#carousel_1">Photo Gallery</a></li>
        <li>
          <a href="products.html">Products</a>
          <ul class="nav--hidden">
            <li><a href="fabrics.html">Fabrics</a></li>
          </ul>
        </li>
        <li><a href="contact.html" class="selected">Contact</a></li>
      </ul>
    </header>
    <div id="contact-content">
      <h2>Contact Us &#128234;</h2>
      <div class="container--centered-row">
        <form method="post" action="https://hnitest.go.yj.fr">
          <table class="invisible-table">
            <tr>
              <td>
                <label>
                  Last Name
                  <input
                    class="contact-form"
                    id="lastname"
                    type="text"
                    name="lastname"
                    required
                    placeholder="Your last name"
                  />
                </label>
              </td>
              <td>
                <label>
                  First Name
                  <input
                    class="contact-form"
                    id="firstname"
                    type="text"
                    name="firstname"
                    required
                    placeholder="Your first name"
                  />
                </label>
              </td>
            </tr>
            <tr>
              <td colspan="2">
                <label>
                  Mail
                  <input
                    class="contact-form"
                    id="mail"
                    type="email"
                    name="mail"
                    placeholder="yourmail@yahoo.com"
                    required
                  />
                </label>
              </td>
            </tr>
            <tr>
              <td colspan="2">
                <label>
                  Request
                  <textarea
                    class="contact-form"
                    name="request"
                    id="request"
                    cols="66"
                    rows="10"
                    required
                    placeholder="Your message : your question, your request for a custom-made book cover, etc."
                  ></textarea>
                </label>
              </td>
            </tr>
            <tr>
              <td colspan="2">
                <label>
                  Country
                  <select
                    class="contact-form"
                    name="country"
                    id="country"
                    required
                    size="1"
                  >
                    <option value="" disabled selected>
                      -- Choose your country --
                    </option>
                    <option value="France">France</option>
                    <option value="Belgium">Belgium</option>
                    <option value="Switzerland">Switzerland</option>
                  </select>
                </label>
              </td>
            </tr>
            <tr>
              <td>
                <label class="button">
                  <span class="button--visible-part">Reset</span>
                  <span class="button--hidden-part">&#11118;</span>
                  <input type="reset" hidden
                /></label>
              </td>
              <td>
                <label class="button">
                  <span class="button--visible-part">Send</span>
                  <span class="button--hidden-part">&#11162;</span>
                  <input type="submit" hidden
                /></label>
              </td>
            </tr>
          </table>
        </form>
      </div>
    </div>
    <footer>
      <p class="footer">&copy; 2026 Sweat Books</p>
    </footer>
  </body>
</html>
