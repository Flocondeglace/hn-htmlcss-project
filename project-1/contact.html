<!doctype html>
<html>
  <head>
    <title>Sweat Books</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>Sweat Books</h1>
      <ul class="nav">
        <li><a href="index.html">Home</a></li>
        <li>
          <a href="about.html">About</a>
          <ul class="nav--hidden">
            <li><a href="staff.html">Staff</a></li>
          </ul>
        </li>
        <li><a href="gallery.html#carousel_1">Photo Gallery</a></li>
        <li>
          <a href="products.html">Products</a>
          <ul class="nav--hidden">
            <li><a href="fabrics.html">Fabrics</a></li>
          </ul>
        </li>
        <li><a href="contact.html" class="selected">Contact</a></li>
      </ul>
    </header>
    <div id="contact-content">
      <h2>Contact Us &#128234;</h2>
      <div class="container--centered-row">
        <form method="post" action="https://hnitest.go.yj.fr">
          <table class="invisible-table">
            <tr>
              <td>
                <label>
                  <h3>Last Name</h3>
                  <input
                    class="contact-form"
                    id="lastname"
                    type="text"
                    name="lastname"
                    required
                    placeholder="Your last name"
                  />
                </label>
              </td>
              <td>
                <label>
                  <h3>First Name</h3>
                  <input
                    class="contact-form"
                    id="firstname"
                    type="text"
                    name="firstname"
                    required
                    placeholder="Your first name"
                  />
                </label>
              </td>
            </tr>
            <tr>
              <td colspan="2">
                <label>
                  <h3>Mail</h3>
                  <input
                    class="contact-form"
                    id="mail"
                    type="email"
                    name="mail"
                    placeholder="yourmail@yahoo.com"
                    required
                  />
                </label>
              </td>
            </tr>
            <tr>
              <td colspan="2">
                <label>
                  <h3>Request</h3>
                  <textarea
                    class="contact-form"
                    name="request"
                    id="request"
                    cols="66"
                    rows="10"
                    required
                    placeholder="Your message : your question, your request for a custom-made book cover, etc."
                  ></textarea>
                </label>
              </td>
            </tr>
            <tr>
              <td colspan="2">
                <label>
                  <h3>Country</h3>
                  <select
                    class="contact-form"
                    name="country"
                    id="country"
                    required
                  >
                    <option value="France" selected>France</option>
                    <option value="Belgium">Belgium</option>
                    <option value="Switzerland">Switzerland</option>
                  </select>
                </label>
              </td>
            </tr>
            <tr>
              <td>
                <label>
                  <div class="button">
                    <p class="button--visible-part">Reset</p>
                    <p class="button--hidden-part">&#11118;</p>
                  </div>
                  <input type="reset" hidden
                /></label>
              </td>
              <td>
                <label>
                  <div class="button">
                    <p class="button--visible-part">Send</p>
                    <p class="button--hidden-part">&#11162;</p>
                  </div>
                  <input type="submit" hidden
                /></label>
              </td>
            </tr>
          </table>
        </form>
      </div>
    </div>
    <footer>
      <p class="footer">&copy; 2026 Sweat Books</p>
    </footer>
  </body>
</html>
